<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<style>
body {
  width: 300px;
  height: fit-content;
  background: #0f172a;
  color: white;
  font-family: sans-serif;
  padding: 15px;
}

h3 {
  text-align: center;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
  background: #1e293b;
  color: white;
}

#drop {
  height: 120px;
  border: 2px dashed #475569;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #94a3b8;
  cursor: pointer;
}

#drop.drag {
  border-color: #38bdf8;
  background: rgba(56,189,248,0.1);
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #38bdf8;
  cursor: pointer;
}

img {
  width: 100%;
  margin-top: 10px;
  border-radius: 8px;
  max-height: 300px;
  display: none;
}
</style>
</head>

<body>

<h3>Upload</h3>

<input id="title" placeholder="Titre...">

<div id="drop">Glisse ou clique</div>

<input type="file" id="fileInput" accept="image/*" hidden>

<img id="preview">

<button id="save">Valider</button>

<script src="popup.js"></script>

</body>
</html>
